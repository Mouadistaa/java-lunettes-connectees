#  Configuration du frontend Lunettes connectees

#  Ce fichier est embarque dans le jar. Pour le surcharger sans recompiler.
#   java -Dmqtt.broker.host=192.168.1.42 -jar lunettes-frontend-*.jar

# --- Broker MQTT ---
mqtt.broker.host=localhost
mqtt.broker.port=1883

# --- Identite du client MQTT (un UUID est appendu derriere pour eviter les collisions) ---
mqtt.client.id.prefix=frontend-

# --- Timeout d'attente d'une reponse de verification de numero de serie (ms) ---
verification.timeout.ms=5000