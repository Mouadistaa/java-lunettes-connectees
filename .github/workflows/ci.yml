name: CI

on:
  pull_request:
    branches: [develop, main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Configuration de Maven settings.xml
        run: |
          mkdir -p ~/.m2
          echo '<settings><servers><server>
            <id>github-prof-fabricateur</id>
            <username>${{ secrets.PROF_USERNAME }}</username>
            <password>${{ secrets.PROF_TOKEN }}</password>
          </server></servers></settings>' > ~/.m2/settings.xml

      - name: Build et tests
        run: mvn -B clean verify
