name: Release de l'Usine

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          server-id: github-publish
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
          cache: maven

      - name: Configuration accès fabricateur
        run: |
          mkdir -p ~/.m2
          echo '<settings><servers>
            <server>
              <id>github-prof-fabricateur</id>
              <username>${{ secrets.PROF_USERNAME }}</username>
              <password>${{ secrets.PROF_TOKEN }}</password>
            </server>
            <server>
              <id>github-publish</id>
              <username>${{ github.actor }}</username>
              <password>${{ secrets.GITHUB_TOKEN }}</password>
            </server>
          </servers></settings>' > ~/.m2/settings.xml

      - name: Publication de l'Usine
        run: mvn -B -pl lunettes-usine -am deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
